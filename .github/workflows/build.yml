name: Build ETL Runner

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write  # For SARIF upload (Grype results)

jobs:
  build:
    uses: zavestudios/platform-pipelines/.github/workflows/container-build.yml@d6a1e8756e6bf0611a754dca4a139aa6a688f74a
    with:
      image_name: ${{ github.repository_owner }}/zavestudios-etl-runner
      dockerfile: Dockerfile
      push: ${{ github.ref == 'refs/heads/main' }}
      platforms: linux/amd64
      fail_severity: CRITICAL
      # grype_enabled: true  # Enable Grype CVE scanning (cross-validates Trivy)
      # stig_audit_enabled: true  # TODO: Enable once platform-pipelines supports it
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
